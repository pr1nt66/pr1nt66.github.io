<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>amnesia.sbs</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2647d8;
      --primary-hover: #4f46e5;
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f1f5f9;
      --accent: #2647d8;
      --green: #10b981;
      --red: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(38,71,216,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(38,71,216,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      background: var(--bg);
    }

    .splash-glow {
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(38,71,216,0.13) 0%, transparent 70%);
      pointer-events: none;
      animation: pulseGlow 4s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%,100% { transform: scale(1);    opacity: 0.6; }
      50%      { transform: scale(1.15); opacity: 1;   }
    }

    .splash-ring {
      position: absolute;
      border: 1px solid rgba(38,71,216,0.12);
      border-radius: 50%;
      animation: expandRing 4s ease-out infinite;
    }
    .splash-ring:nth-of-type(2) { width:300px; height:300px; animation-delay:0s; }
    .splash-ring:nth-of-type(3) { width:480px; height:480px; animation-delay:1.2s; }
    .splash-ring:nth-of-type(4) { width:640px; height:640px; animation-delay:2.4s; }
    @keyframes expandRing {
      0%   { opacity:0.5; transform:scale(0.95); }
      100% { opacity:0;   transform:scale(1.06); }
    }

    .scan-line {
      position: absolute;
      left:0; right:0; height:1px;
      background: linear-gradient(90deg, transparent, rgba(38,71,216,0.4), transparent);
      animation: scan 4s linear infinite;
      pointer-events: none;
    }
    @keyframes scan {
      0%  { top:0;    opacity:1;   }
      95% { top:100%; opacity:0.1; }
      100%{ top:100%; opacity:0;   }
    }

    .splash-content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 52px;
    }

    .splash-logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      animation: logoAppear 1s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes logoAppear {
      from { opacity:0; transform:translateY(30px) scale(0.92); }
      to   { opacity:1; transform:translateY(0)    scale(1);    }
    }

    .splash-icon {
      width:72px; height:72px;
      filter: drop-shadow(0 0 22px rgba(38,71,216,0.65));
    }

    .splash-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.4rem, 7vw, 4rem);
      font-weight: 700;
      letter-spacing: 6px;
      color: #fff;
      text-shadow:
        0 0 40px rgba(38,71,216,0.5),
        0 0 80px rgba(38,71,216,0.2);
      line-height: 1;
    }
    .splash-title span { color: var(--primary); text-shadow: 0 0 24px rgba(38,71,216,0.9), 0 0 60px rgba(38,71,216,0.4); }

    .splash-tagline {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.18);
      text-transform: uppercase;
      margin-top: -6px;
    }

    .splash-divider {
      width: 80px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(38,71,216,0.6), transparent);
    }

    .splash-enter {
      position: relative;
      padding: 15px 72px;
      background: transparent;
      border: 1px solid rgba(38,71,216,0.45);
      border-radius: 2px;
      color: rgba(255,255,255,0.6);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.3s, color 0.3s, box-shadow 0.3s;
      animation: btnAppear 1s 0.45s cubic-bezier(0.16,1,0.3,1) both;
      width: auto;
    }
    @keyframes btnAppear {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0);    }
    }
    .splash-enter::before {
      content:'';
      position:absolute; inset:0;
      background: var(--primary);
      transform: translateX(-105%);
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
      z-index:0;
    }
    .splash-enter:hover::before { transform:translateX(0); }
    .splash-enter:hover { border-color:var(--primary); color:#fff; box-shadow:0 0 30px rgba(38,71,216,0.3); }
    .splash-enter span { position:relative; z-index:1; }

    .splash-enter::after {
      content:'';
      position:absolute;
      top:4px; left:4px;
      width:6px; height:6px;
      border-top:1px solid rgba(38,71,216,0.7);
      border-left:1px solid rgba(38,71,216,0.7);
      z-index:2;
    }

    @keyframes splashOut {
      to { opacity:0; transform:scale(1.05); }
    }

    #app {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }
    #app.visible { display: flex; }

    .container { max-width: 800px; width: 100%; }

    h1 {
      text-align:center; color:var(--primary); font-weight:800;
      letter-spacing:4px; font-family:'Share Tech Mono', monospace;
      font-size:1.6rem; margin-bottom:6px;
      animation: fadeDown 0.5s ease both;
    }
    .app-subtitle {
      text-align:center; font-size:0.75rem; letter-spacing:3px;
      color:rgba(255,255,255,0.25); text-transform:uppercase; margin-bottom:40px;
      font-family:'Share Tech Mono', monospace;
      animation: fadeDown 0.5s 0.1s ease both;
    }
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-10px); }
      to   { opacity:1; transform:translateY(0);     }
    }

    .card {
      background:var(--card-bg); padding:25px; border-radius:4px;
      box-shadow:0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom:25px;
      border:1px solid rgba(255,255,255,0.05);
      animation: cardIn 0.5s ease both;
    }
    .card:nth-child(1){ animation-delay:0.1s; }
    .card:nth-child(2){ animation-delay:0.2s; }
    .card:nth-child(3){ animation-delay:0.3s; }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0);    }
    }

    h3 {
      margin-top:0; margin-bottom:18px; color:var(--accent);
      font-size:1rem; font-family:'Share Tech Mono', monospace;
      letter-spacing:2px; text-transform:uppercase;
    }
    label { display:block; margin-bottom:8px; font-size:0.85rem; opacity:0.7; letter-spacing:1px; }

    textarea, input[type="password"] {
      width:100%; padding:12px; border-radius:4px;
      border:1px solid #334155;
      background:#0f172a; color:white;
      box-sizing:border-box; margin-bottom:15px;
      font-family:'Share Tech Mono', monospace;
      transition:border 0.3s; font-size:0.9rem;
    }
    textarea:focus, input[type="password"]:focus {
      border-color:var(--primary); outline:none;
      box-shadow:0 0 0 3px rgba(38,71,216,0.1);
    }

    button {
      width:100%; padding:12px;
      background:var(--primary); border:0; color:white;
      font-weight:700; font-family:'Rajdhani', sans-serif;
      font-size:0.95rem; letter-spacing:2px;
      text-transform:uppercase; border-radius:4px; cursor:pointer;
      transition:transform 0.1s, background 0.2s, box-shadow 0.2s;
    }
    button:hover { background:var(--primary-hover); box-shadow:0 0 16px rgba(38,71,216,0.3); }
    button:active { transform:scale(0.98); }
    button.secondary { background:#475569; }
    button.secondary:hover { background:#64748b; box-shadow:none; }

    .output-container { position:relative; }
    .output {
      background:#000; padding:20px; border-radius:4px;
      border:1px solid var(--primary); min-height:60px;
      word-wrap:break-word; font-family:'Share Tech Mono', monospace;
      font-size:0.85rem; color:var(--green); white-space:pre-wrap;
    }
    .copy-btn {
      position:absolute; top:10px; right:10px;
      padding:5px 10px; font-size:0.65rem;
      background:rgba(38,71,216,0.15);
      border:1px solid var(--primary);
      width:auto; letter-spacing:1px;
    }
  </style>
</head>
<body>

<div class="grid-bg"></div>

<div id="splash">
  <div class="scan-line"></div>
  <div class="splash-glow"></div>
  <div class="splash-ring"></div>
  <div class="splash-ring"></div>
  <div class="splash-ring"></div>

  <div class="splash-content">
    <div class="splash-logo-wrap">
      <svg class="splash-icon" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="14" y="32" width="44" height="30" rx="3" stroke="#2647d8" stroke-width="2"/>
        <path d="M22 32V24C22 16.268 28.268 10 36 10C43.732 10 50 16.268 50 24V32" stroke="#2647d8" stroke-width="2" stroke-linecap="round"/>
        <circle cx="36" cy="47" r="4.5" fill="#2647d8"/>
        <line x1="36" y1="51.5" x2="36" y2="57" stroke="#2647d8" stroke-width="2" stroke-linecap="round"/>
        <line x1="14" y1="35" x2="14" y2="32" stroke="rgba(38,71,216,0.5)" stroke-width="1"/>
        <line x1="14" y1="32" x2="17" y2="32" stroke="rgba(38,71,216,0.5)" stroke-width="1"/>
        <line x1="58" y1="35" x2="58" y2="32" stroke="rgba(38,71,216,0.5)" stroke-width="1"/>
        <line x1="58" y1="32" x2="55" y2="32" stroke="rgba(38,71,216,0.5)" stroke-width="1"/>
        <line x1="14" y1="59" x2="14" y2="62" stroke="rgba(38,71,216,0.5)" stroke-width="1"/>
        <line x1="14" y1="62" x2="17" y2="62" stroke="rgba(38,71,216,0.5)" stroke-width="1"/>
        <line x1="58" y1="59" x2="58" y2="62" stroke="rgba(38,71,216,0.5)" stroke-width="1"/>
        <line x1="58" y1="62" x2="55" y2="62" stroke="rgba(38,71,216,0.5)" stroke-width="1"/>
      </svg>

      <div class="splash-title">amnesia<span>.sbs</span></div>
      <div class="splash-tagline">sistema de cifrado seguro</div>
      <div class="splash-divider"></div>
    </div>

    <button class="splash-enter" onclick="entrar()">
      <span>Ingresar</span>
    </button>
  </div>
</div>

<div id="app">
  <div class="container">
    <h1>CIFRADOR MULTICAPA</h1>
    <p class="app-subtitle">Cifrado AES-GCM + XOR + Sustitución</p>

    <div class="card">
      <h3>⬡ Cifrar Mensaje</h3>
      <label>Mensaje original:</label>
      <textarea id="mensaje" rows="4" placeholder="Escribe tu mensaje secreto aquí..."></textarea>
      <label>Contraseña de cifrado:</label>
      <input type="password" id="password" placeholder="Usa una clave fuerte">
      <button onclick="cifrar()">Generar Cifrado</button>
    </div>

    <div class="card">
      <h3>⬡ Descifrar Mensaje</h3>
      <label>Código JSON cifrado:</label>
      <textarea id="mensajeCifrado" rows="4" placeholder='{"salt":"...","iv":"...","datos":"..."}'></textarea>
      <label>Contraseña de descifrado:</label>
      <input type="password" id="passwordDescifrar" placeholder="Introduce la clave">
      <button onclick="descifrar()" class="secondary">Descifrar</button>
    </div>

    <div class="card">
      <h3>⬡ Resultado</h3>
      <div class="output-container">
        <button class="copy-btn" onclick="copiarAlPortapapeles()">Copiar</button>
        <div class="output" id="resultado">Los resultados aparecerán aquí...</div>
      </div>
    </div>
  </div>
</div>

<script>
  function entrar() {
    const splash = document.getElementById('splash');
    splash.style.animation = 'splashOut 0.5s cubic-bezier(0.4,0,1,1) forwards';
    setTimeout(() => {
      splash.style.display = 'none';
      document.getElementById('app').classList.add('visible');
    }, 480);
  }

  const a2b = a => btoa(String.fromCharCode.apply(null, a));
  const b2a = b => Uint8Array.from(atob(b), c => c.charCodeAt(0));
  const xorFn = (d, k) => { let o = new Uint8Array(d.length); for (let i = 0; i < d.length; i++) o[i] = d[i] ^ k[i % k.length]; return o; };
  const sub   = (d, k) => { let o = new Uint8Array(d.length); for (let i = 0; i < d.length; i++) o[i] = (d[i] + k[i % k.length]) % 256; return o; };
  const unsub = (d, k) => { let o = new Uint8Array(d.length); for (let i = 0; i < d.length; i++) o[i] = (d[i] - k[i % k.length] + 256) % 256; return o; };

  async function derivarClave(pw, salt, len = 32) {
    const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), { name: "PBKDF2" }, false, ["deriveBits"]);
    return new Uint8Array(await crypto.subtle.deriveBits({ name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" }, km, len * 8));
  }
  async function cifrarAES(data, key) {
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ck = await crypto.subtle.importKey("raw", key, "AES-GCM", false, ["encrypt"]);
    return { iv, datos: new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, ck, data)) };
  }
  async function descifrarAES(datos, key, iv) {
    const ck = await crypto.subtle.importKey("raw", key, "AES-GCM", false, ["decrypt"]);
    return new Uint8Array(await crypto.subtle.decrypt({ name: "AES-GCM", iv }, ck, datos));
  }

  async function cifrar() {
    try {
      const msg = document.getElementById("mensaje").value;
      const pw  = document.getElementById("password").value;
      if (!msg || !pw) { alert("Rellena todos los campos"); return; }
      let d = new TextEncoder().encode(msg);
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const clave = await derivarClave(pw, salt);
      d = xorFn(d, clave); d = sub(d, clave);
      const aes = await cifrarAES(d, clave);
      document.getElementById("resultado").innerText = JSON.stringify({ salt: a2b(salt), iv: a2b(aes.iv), datos: a2b(aes.datos) }, null, 2);
    } catch (e) {
      document.getElementById("resultado").innerText = "Error: " + e.message;
    }
  }

  async function descifrar() {
    try {
      const pw  = document.getElementById("passwordDescifrar").value;
      const inp = document.getElementById("mensajeCifrado").value.trim();
      if (!pw || !inp) { alert("Ingresa clave y mensaje cifrado"); return; }
      const p = JSON.parse(inp);
      const clave = await derivarClave(pw, b2a(p.salt));
      let d = await descifrarAES(b2a(p.datos), clave, b2a(p.iv));
      d = unsub(d, clave); d = xorFn(d, clave);
      document.getElementById("resultado").innerText = new TextDecoder().decode(d);
    } catch (e) {
      document.getElementById("resultado").innerText = "Error: Contraseña incorrecta o formato inválido";
    }
  }

  function copiarAlPortapapeles() {
    navigator.clipboard.writeText(document.getElementById("resultado").innerText);
    const btn = document.querySelector('.copy-btn');
    btn.innerText = "¡Copiado!";
    setTimeout(() => btn.innerText = "Copiar", 2000);
  }
</script>
</body>
</html>
